<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Green Đồng Nai</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='loginstyle.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="leaves">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="login-card">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="error-container">
            {% for message in messages %}
              <div class="error-msg">
                <i class="fas fa-leaf-fall" style="margin-right: 8px; color: #ffeb3b;"></i>
                {{ message }}
              </div>
            {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <h2>Mừng bạn trở lại! 🌿</h2>
        <p style="color: #eee; font-size: 0.9rem; margin-bottom: 20px;">Đăng nhập để cùng bảo vệ môi trường nhé.</p>

        <form action="{{ url_for('login') }}" method="POST">
            <div class="input-box">
                <input type="text" name="username" placeholder=" " required>
                <label>Tên đăng nhập hoặc Email</label>
            </div>

            <div class="input-box">
                <input type="password" name="password" placeholder=" " required>
                <label>Mật khẩu</label>
            </div>

            <button type="submit" class="login-btn">Vào hệ thống</button>
        </form>

        <p class="signup-text">
            Chưa có tài khoản ư? 
            <a href="{{ url_for('signup') }}" style="color: #fff; font-weight: bold; text-decoration: underline;">Đăng ký ngay</a>
        </p>
    </div>

    <style>
        .error-container {
            background: rgba(255, 77, 77, 0.15);
            border-left: 4px solid #ff4d4d;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 20px;
            animation: shake 0.5s ease-in-out;
        }
        .error-msg {
            color: #fff;
            font-size: 14px;
            text-align: left;
            margin: 5px 0;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</body>
</html>
