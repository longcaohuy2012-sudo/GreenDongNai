<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập</title>
<link rel="stylesheet" href="{{ url_for('static', filename='loginstyle.css') }}">
</head>

<body>

<div class="leaves">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

<div class="login-card">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div style="background: rgba(255, 77, 77, 0.2); color: #fff; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; border: 1px solid #ff4d4d; text-align: center;">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

<h2>Login</h2>

<div class="input-box">
<input type="email" placeholder=" " required>
<label>Username/Email</label>
</div>

<div class="input-box">
<input type="password" placeholder=" " required>
<label>Password</label>
</div>

<button class="login-btn">Login</button>

<p class="signup">
Don't have an account?
<a href="#">Sign up</a>
</p>

</div>

</body>
</html>
