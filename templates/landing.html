<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Đồng Nai</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='stylechu.css') }}">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>
    <div class="leaves">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <nav class="navbar">
        <h2>🌿 Green Đồng Nai</h2>
        <div>
            <a href="{{ url_for('login') }}">Đăng nhập</a>
            <a href="{{ url_for('signup') }}">Đăng ký</a>
        </div>
    </nav>

    <section class="home" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class="home-box" style="max-width: 1000px; width: 100%;">
        <h1>Save The Environment 🌍</h1>
        <p>Hành động nhỏ cho Đồng Nai xanh.</p>

        <div style="display: flex; justify-content: center; gap: 20px; margin: 20px 0; flex-wrap: wrap;">
            
            <div class="model-item" style="flex: 1; min-width: 280px; max-width: 400px;">
                <div class="model-container" style="width: 100%; height: 300px; background: rgba(255,255,255,0.1); border-radius: 15px;">
                    <model-viewer    
                        src="https://github.com/longcaohuy2012-sudo/GreenDongNai/raw/refs/heads/main/static/3Dmodels/CAMERA_model.glb"
                        alt="Mô hình Camera"
                        auto-rotate camera-controls
                        environment-image="neutral"
                        shadow-intensity="1"
                        style="width: 100%; height: 100%;">
                    </model-viewer>
                </div>
                <p style="font-weight: bold; color: #1b4332; margin-top: 10px;">Chụp ảnh</p>
            </div>

            <div class="model-item" style="flex: 1; min-width: 280px; max-width: 400px;">
                <div class="model-container" style="width: 100%; height: 300px; background: rgba(255,255,255,0.1); border-radius: 15px;">
                    <model-viewer 
                        src="https://github.com/longcaohuy2012-sudo/GreenDongNai/raw/refs/heads/main/static/3Dmodels/3RS_model.glb"
                        alt="Mô hình 3Rs"
                        auto-rotate camera-controls
                        environment-image="neutral"
                        shadow-intensity="1"
                        style="width: 100%; height: 100%;">
                    </model-viewer>
                </div>
                <p style="font-weight: bold; color: #1b4332; margin-top: 10px;">AI Phân loại</p>
            </div>

        </div>

        <a href="{{ url_for('login') }}" class="main-btn">Bắt đầu ngay</a>
    </div>
</section>
</body>
</html>
