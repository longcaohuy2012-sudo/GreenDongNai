<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Đồng Nai</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='stylechu.css') }}">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>
    <div class="leaves">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <nav class="navbar">
        <h2>🌿 Green Đồng Nai</h2>
        <div>
            <a href="{{ url_for('login') }}">Đăng nhập</a>
            <a href="{{ url_for('signup') }}">Đăng ký</a>
        </div>
    </nav>

    <section class="home">
        <div class="home-box">
            <h1>Save The Environment 🌍</h1>
            <p>Hành động nhỏ cho Đồng Nai xanh.</p>

            <div style="display: flex; justify-content: center; gap: 40px; margin: 25px 0; flex-wrap: wrap;">
                
                <div style="text-align: center;">
                    <div class="model-container">
                        <model-viewer    
                        src="https://github.com/longcaohuy2012-sudo/GreenDongNai/raw/refs/heads/main/static/3Dmodels/CAMERA_model.glb"
                        alt="Mô hình 3D Green Đồng Nai"
                        auto-rotate 
                        camera-controls
                        loading="lazy"
                        style="width: 100%; height: 400px;">
                        </model-viewer>
                    </div>
                    <p style="font-size: 0.9rem; font-weight: bold; color: #1b4332; margin-top: 5px;">Chụp ảnh</p>
                </div>

                <div style="text-align: center;">
                    <div class="model-container">
                        <model-viewer 
                            src="https://github.com/longcaohuy2012-sudo/GreenDongNai/raw/refs/heads/main/static/3Dmodels/3RS_model.glb"
                            alt="Mô hình 3D Green Đồng Nai"
                            auto-rotate 
                            camera-controls
                            loading="lazy"
                            style="width: 100%; height: 400px;">
                        </model-viewer>
                    </div>
                    <p style="font-size: 0.9rem; font-weight: bold; color: #1b4332; margin-top: 5px;">AI Phân loại</p>
                </div>
            </div>

            <a href="{{ url_for('login') }}" class="main-btn">Bắt đầu ngay</a>
        </div>
    </section>

    </body>
</html>
