<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Green Đồng Nai</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/loginstyle.css') }}">
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-625RXZ1M32"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-625RXZ1M32');
</script>
</head>
<body>
    <div class="leaves">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="login-card">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div style="background: rgba(255, 77, 77, 0.2); color: #fff; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; border: 1px solid #ff4d4d; text-align: center;">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <h2>Create Account</h2>

        <form action="{{ url_for('signup') }}" method="POST">
            <div class="input-box">
                <input type="text" name="username" placeholder=" " required>
                <label>Username</label>
            </div>

            <div class="input-box">
                <input type="email" name="email" placeholder=" " required>
                <label>Email</label>
            </div>

            <div class="input-box">
                <input type="password" name="password" id="password" placeholder=" " required>
                <label>Password</label>
            </div>

            <div class="input-box">
                <input type="password" name="passwordconfirm" id="confirm_password" placeholder=" " required>
                <label>Confirm Password</label>
            </div>

            <button type="submit" class="login-btn">Sign Up</button>
        </form>

        <p class="signup">
            Already have an account? 
            <a href="{{ url_for('login') }}">Login</a>
        </p>
    </div>

    <script>
        // Bây giờ nó đã tìm thấy ID để "nắm đầu" rồi đây
        var password = document.getElementById("password");
        var confirm_password = document.getElementById("confirm_password");

        function validatePassword(){
          if(password.value != confirm_password.value) {
            confirm_password.setCustomValidity("Mật khẩu không khớp rồi bạn ơi!");
          } else {
            confirm_password.setCustomValidity('');
          }
        }

        password.onchange = validatePassword;
        confirm_password.onkeyup = validatePassword;
    </script>
</body>
</html>
