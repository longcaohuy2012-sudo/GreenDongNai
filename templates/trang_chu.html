<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Green Đồng Nai</title>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

/* BACKGROUND */
body{
  height:100vh;
  background:linear-gradient(135deg,#b7e4c7,#95d5b2,#74c69d);
  overflow:hidden;
  position:relative;
}

/* ÁNH SÁNG */
body::before{
  content:"";
  position:absolute;
  width:600px;
  height:600px;
  background:radial-gradient(circle,rgba(255,255,255,0.6),transparent 70%);
  top:-150px;
  left:-150px;
  filter:blur(40px);
  animation:sunmove 8s ease-in-out infinite alternate;
}

@keyframes sunmove{
  0%{transform:translate(0,0);}
  100%{transform:translate(100px,80px);}
}

/* LÁ RƠI */
.leaves{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
}

.leaves span{
  position:absolute;
  top:-50px;
  width:20px;
  height:20px;
  background:#1b4332;
  border-radius:50% 0;
  animation:fall linear infinite;
}

.leaves span:nth-child(1){ left:10%; animation-duration:12s; }
.leaves span:nth-child(2){ left:25%; animation-duration:10s; }
.leaves span:nth-child(3){ left:40%; animation-duration:14s; }
.leaves span:nth-child(4){ left:60%; animation-duration:11s; }
.leaves span:nth-child(5){ left:75%; animation-duration:13s; }
.leaves span:nth-child(6){ left:85%; animation-duration:9s; }
.leaves span:nth-child(7){ left:50%; animation-duration:15s; }

@keyframes fall{
  0%{transform:translateY(0) rotate(0deg); opacity:0;}
  10%{opacity:1;}
  100%{transform:translateY(110vh) rotate(360deg); opacity:0;}
}

/* LOGO */
.main-logo{
  text-align:center;
  margin-top:30px;
  font-size:40px;
  color:#1b4332;
}

/* ===== NAVBAR FC ===== */
.hover-zone{
  position:fixed;
  top:0;
  width:100%;
  height:25px;
  z-index:999;
}

.navbar{
  position:fixed;
  top:-80px;
  left:0;
  width:100%;

  display:flex;
  justify-content:center;
  gap:30px;

  padding:20px;

  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(15px);

  transition:0.4s;
  z-index:998;

  position:fixed;
}

/* HIỆN NAVBAR */
.hover-zone:hover + .navbar,
.navbar:hover{
  top:0;
}

/* THANH TRÊN NAVBAR (FC) */
.fc-top-bar{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:6px;
  overflow:hidden;
}

.fc-top-bar::before{
  content:"";
  position:absolute;
  width:40%;
  height:100%;
  background:linear-gradient(90deg,#1b4332,#2d6a4f,#52b788);
  border-radius:10px;
  animation:fcMove 2s infinite alternate;
}

@keyframes fcMove{
  from{ left:-20%; }
  to{ left:80%; }
}

/* MENU */
.navbar a{
  text-decoration:none;
  color:#1b4332;
  font-weight:bold;
  padding:10px 20px;
  border-radius:20px;
  transition:0.3s;
}

.navbar a:hover{
  background:#2d6a4f;
  color:white;
}

/* ===== THANH TRÊN MODEL ===== */
.fc-bar{
  height:6px;
  width:100%;
  background:rgba(0,0,0,0.1);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:10px;
}

.fc-bar::before{
  content:"";
  display:block;
  height:100%;
  width:60%;
  background:linear-gradient(90deg,#1b4332,#2d6a4f,#40916c);
  border-radius:10px;
  animation:moveBar 2s infinite alternate;
}

@keyframes moveBar{
  from{ transform:translateX(-30%); }
  to{ transform:translateX(30%); }
}

/* CONTENT */
.home{
  display:flex;
  justify-content:center;
  align-items:center;
  height:70vh;
}

.home-box{
  background:rgba(255,255,255,0.15);
  padding:40px;
  border-radius:25px;
  backdrop-filter:blur(15px);
  text-align:center;
}

/* MODELS */
.models{
  display:flex;
  gap:20px;
  margin-top:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.model-item{
  width:250px;
}

</style>
</head>

<body>

<!-- LÁ -->
<div class="leaves">
<span></span><span></span><span></span>
<span></span><span></span><span></span><span></span>
</div>

<!-- HOVER -->
<div class="hover-zone"></div>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="fc-top-bar"></div>

  <a href="#">Trang chủ</a>
  <a href="#">Phân loại rác</a>
  <a href="#">Chụp ảnh</a>
  <a href="#">Thống kê</a>
  <a href="#">Tài khoản</a>
</nav>

<!-- LOGO -->
<h1 class="main-logo">🌿 Green Đồng Nai</h1>

<!-- CONTENT -->
<section class="home">
  <div class="home-box">

    <h2>Hệ thống AI môi trường</h2>
    <p>Chọn chức năng bên dưới</p>

    <div class="models">

      <!-- CAMERA -->
      <div class="model-item">
        <div class="fc-bar"></div>
        <model-viewer 
        src="https://raw.githubusercontent.com/longcaohuy2012-sudo/GreenDongNai/main/static/3Dmodels/CAMERA_model.glb"
        auto-rotate camera-controls
        style="width:100%; height:250px;">
        </model-viewer>
        <p>📷 Chụp ảnh</p>
      </div>

      <!-- 3RS -->
      <div class="model-item">
        <div class="fc-bar"></div>
        <model-viewer 
        src="https://raw.githubusercontent.com/longcaohuy2012-sudo/GreenDongNai/main/static/3Dmodels/3RS_model.glb"
        auto-rotate camera-controls
        style="width:100%; height:250px;">
        </model-viewer>
        <p>♻️ Phân loại rác</p>
      </div>

    </div>

  </div>
</section>

</body>
</html>
