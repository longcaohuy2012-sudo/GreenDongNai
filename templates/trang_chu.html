<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng điều khiển - Green Đồng Nai</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='stylechu.css') }}">
</head>
<body>
    <div class="leaves">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="dashboard-container">
        <header class="db-header">
            <h1>Bảng điều khiển 🌿</h1>
            <p>Chào mừng <strong>{{ session['user'] }}</strong>! Hôm nay bạn đã đóng góp bao nhiêu mầm xanh?</p>
        </header>

        <div class="db-grid">
            <div class="db-card">
                <div class="db-icon">📸</div>
                <h3>Nhận diện ảnh</h3>
                <p>Sử dụng AI phân loại rác qua camera.</p>
                <form action="{{ url_for('AI_image') }}" method="POST" enctype="multipart/form-data">
                    <input type="file" name="file" accept="image/*" required style="margin-bottom: 10px;">
                    <button type="submit" class="main-btn" style="padding: 5px 15px;">Phân loại ngay</button>
                </form>
            </div>

            <a href="{{ url_for('phan_loai') }}" class="db-card">
                <div class="db-icon">♻️</div>
                <h3>Hướng dẫn phân loại</h3>
                <p>Kiến thức xử lý rác đúng cách.</p>
            </a>
        </div>

        <footer class="db-footer" style="margin-top: 30px;">
            <a href="{{ url_for('logout') }}" class="btn-logout" style="color: #ff4d4d; text-decoration: none; font-weight: bold;">Thoát tài khoản</a>
        </footer>
    </div>
</body>
</html>
